syntax = "proto3";

package aegislink.bridge.v1;

option go_package = "github.com/ayushns01/aegislink/chain/aegislink/gen/go/aegislink/bridge/v1;bridgev1";

import "aegislink/bridge/v1/bridge.proto";

service TxService {
  rpc SubmitDepositClaim(SubmitDepositClaimRequest) returns (SubmitDepositClaimResponse);
  rpc ExecuteWithdrawal(ExecuteWithdrawalRequest) returns (ExecuteWithdrawalResponse);
}

message SubmitDepositClaimRequest {
  DepositClaim claim = 1;
  Attestation attestation = 2;
}

message SubmitDepositClaimResponse {
  string status = 1;
  string message_id = 2;
  string claim_key = 3;
  string denom = 4;
  string amount = 5;
}

message ExecuteWithdrawalRequest {
  string asset_id = 1;
  string amount = 2;
  string recipient = 3;
  uint64 deadline = 4;
  bytes signature = 5;
  uint64 block_height = 6;
}

message ExecuteWithdrawalResponse {
  string message_id = 1;
  string asset_id = 2;
  string asset_address = 3;
  string amount = 4;
  string recipient = 5;
  uint64 deadline = 6;
  uint64 block_height = 7;
  string signature_base64 = 8;
}
