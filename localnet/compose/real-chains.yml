services:
  aegislink:
    image: alpine:3.22
    command: ["sh", "-lc", "echo 'bootstrap with scripts/localnet/bootstrap_real_chain.sh' && sleep infinity"]
    profiles: ["real-chains"]

  osmo-local:
    image: alpine:3.22
    command: ["sh", "-lc", "echo 'bootstrap with scripts/localnet/bootstrap_destination_chain.sh' && sleep infinity"]
    profiles: ["real-chains"]

  route-relayer:
    image: alpine:3.22
    command: ["sh", "-lc", "echo 'bootstrap with scripts/localnet/bootstrap_ibc.sh, then run packet relay against aegislink and osmo-local homes' && sleep infinity"]
    profiles: ["real-chains"]
