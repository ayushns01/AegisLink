global:
  api-listen-addr: :5183
  timeout: 10s
  memo: ""
chains:
  - id: aegislink-public-testnet-1
    type: cosmos
    value:
      key: aegislink-demo
      chain-id: aegislink-public-testnet-1
      rpc-addr: http://127.0.0.1:27657
      websocket-addr: ws://127.0.0.1:27657/websocket
      grpc-addr: http://127.0.0.1:9090
      account-prefix: cosmos
      keyring-backend: test
      gas-adjustment: 1.3
      gas-prices: 0.0ueth
      debug: false
      timeout: 10s
      output-format: json
      sign-mode: direct
  - id: osmosis-testnet
    type: cosmos
    value:
      key: osmosis-demo
      chain-id: osmosis-testnet
      rpc-addr: https://rpc.osmotest5.osmosis.zone:443
      websocket-addr: ""
      grpc-addr: https://grpc.osmotest5.osmosis.zone:443
      account-prefix: osmo
      keyring-backend: test
      gas-adjustment: 1.3
      gas-prices: 0.025uosmo
      debug: false
      timeout: 10s
      output-format: json
      sign-mode: direct
