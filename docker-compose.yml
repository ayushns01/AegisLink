services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: ["anvil", "--host", "0.0.0.0", "--port", "8545"]
    ports:
      - "8545:8545"
    profiles: ["devnet"]

  aegislinkd:
    image: golang:1.23
    working_dir: /workspace
    command: ["go", "run", "./chain/aegislink/cmd/aegislinkd"]
    volumes:
      - .:/workspace
    profiles: ["devnet"]

  bridge-relayer:
    image: golang:1.23
    working_dir: /workspace
    command: ["go", "run", "./relayer/cmd/bridge-relayer"]
    environment:
      AEGISLINK_RELAYER_COSMOS_CHAIN_ID: aegislink-1
      AEGISLINK_RELAYER_ATTESTATION_THRESHOLD: "2"
      AEGISLINK_RELAYER_SUBMISSION_RETRY_LIMIT: "2"
      AEGISLINK_RELAYER_EVM_CONFIRMATIONS: "2"
      AEGISLINK_RELAYER_COSMOS_CONFIRMATIONS: "1"
      AEGISLINK_RELAYER_EVM_STATE_PATH: /workspace/.local/e2e/evm-state.json
      AEGISLINK_RELAYER_ATTESTATION_STATE_PATH: /workspace/.local/e2e/attestations.json
      AEGISLINK_RELAYER_COSMOS_STATE_PATH: /workspace/.local/e2e/cosmos-state.json
      AEGISLINK_RELAYER_COSMOS_OUTBOX_PATH: /workspace/.local/e2e/cosmos-outbox.json
      AEGISLINK_RELAYER_EVM_OUTBOX_PATH: /workspace/.local/e2e/evm-outbox.json
      AEGISLINK_RELAYER_REPLAY_STORE_PATH: /workspace/.local/e2e/replay-store.json
    volumes:
      - .:/workspace
    depends_on:
      - anvil
      - aegislinkd
    profiles: ["devnet"]

  mock-osmosis-target:
    image: golang:1.23
    working_dir: /workspace
    command: ["go", "run", "./relayer/cmd/mock-osmosis-target"]
    environment:
      AEGISLINK_MOCK_OSMOSIS_ADDR: ":9191"
      AEGISLINK_MOCK_OSMOSIS_MODE: "success"
      AEGISLINK_MOCK_OSMOSIS_STATE_PATH: /workspace/.local/e2e/mock-osmosis.json
    volumes:
      - .:/workspace
    ports:
      - "9191:9191"
    profiles: ["devnet", "monitoring"]

  route-relayer:
    image: golang:1.23
    working_dir: /workspace
    command: ["go", "run", "./relayer/cmd/route-relayer"]
    environment:
      AEGISLINK_ROUTE_RELAYER_AEGISLINK_CMD: go
      AEGISLINK_ROUTE_RELAYER_AEGISLINK_CMD_ARGS: run ./chain/aegislink/cmd/aegislinkd
      AEGISLINK_ROUTE_RELAYER_AEGISLINK_STATE_PATH: /workspace/.local/e2e/aegislink-state.json
      AEGISLINK_ROUTE_RELAYER_TARGET_URL: http://mock-osmosis-target:9191
      AEGISLINK_ROUTE_RELAYER_TARGET_TIMEOUT_MS: "1000"
    volumes:
      - .:/workspace
    depends_on:
      - mock-osmosis-target
    profiles: ["devnet"]

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - mock-osmosis-target
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    profiles: ["monitoring"]
